<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive or Heist — Know Thyself</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --amber:#D4930D;--amber-l:#F0D080;--amber-p:#FDF6E3;
  --ember:#C24D2C;--ember-g:#E86A42;--ember-p:#FDF0EC;
  --ink:#1E1E1E;--ink70:#555;--ink40:#999;--ink20:#CCC;--ink10:#E8E4DE;
  --cream:#FDFBF6;--warm:#FAF5EC;--white:#fff;
  --sage:#5A7F60;--sage-l:#EAF2EA;
  --night:#1A2530;--night-s:#223040;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;color:var(--ink);background:var(--cream);line-height:1.65;font-size:16px;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── Screens ── */
.scr{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:2rem}
.scr.on{display:flex}
.scr.top{justify-content:flex-start;padding-top:3rem}
.scr.center{justify-content:center}

.card{max-width:620px;width:100%;position:relative;z-index:1}

/* ── Typography ── */
.badge{display:inline-block;padding:0.28rem 0.85rem;border-radius:100px;font-size:0.68rem;letter-spacing:0.16em;text-transform:uppercase;font-weight:500;margin-bottom:1.4rem}
.b-warm{background:var(--amber-p);color:var(--amber);border:1px solid rgba(212,147,13,0.2)}
.b-cold{background:var(--sage-l);color:var(--sage);border:1px solid rgba(90,127,96,0.2)}
.b-you{background:var(--ember-p);color:var(--ember);border:1px solid rgba(194,77,44,0.2)}
.b-intro{border:1px solid var(--ink10);color:var(--ink40)}

h1.big{font-family:'Fraunces',serif;font-size:clamp(2.4rem,5.5vw,3.6rem);font-weight:400;line-height:1.1;margin-bottom:0.3rem}
h1.big em{font-style:italic;color:var(--ember)}
.sub{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:300;color:var(--ink70);font-style:italic;margin-bottom:1.6rem}
.body{font-size:0.95rem;color:var(--ink70);line-height:1.7;margin-bottom:0.7rem}

h2.qt{font-family:'Fraunces',serif;font-size:1.45rem;font-weight:400;line-height:1.25;margin-bottom:0.3rem}
.qd{font-size:0.86rem;color:var(--ink40);margin-bottom:1.6rem;line-height:1.5}

/* ── Buttons ── */
.btn{display:inline-block;padding:0.85rem 2.2rem;border-radius:100px;font-family:inherit;font-size:0.92rem;font-weight:500;cursor:pointer;border:none;transition:all 0.3s;text-decoration:none}
.btn-p{background:var(--ink);color:var(--cream)}
.btn-p:hover{background:var(--ember);transform:translateY(-2px);box-shadow:0 8px 24px rgba(194,77,44,0.2)}

/* ── Progress ── */
.prog{display:flex;align-items:center;gap:0.8rem;margin-bottom:2rem;width:100%}
.prog-t{flex:1;height:3px;background:var(--ink10);border-radius:2px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--amber),var(--ember));border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.prog-l{font-size:0.72rem;color:var(--ink40);white-space:nowrap}

/* ── Options ── */
.opts{display:flex;flex-direction:column;gap:0.45rem}
.opt{display:flex;align-items:flex-start;gap:0.65rem;padding:0.8rem 1rem;border:1.5px solid var(--ink10);border-radius:10px;cursor:pointer;transition:all 0.2s;background:var(--white);user-select:none}
.opt:hover{border-color:var(--amber-l);background:var(--amber-p)}
.opt.sel{border-color:var(--amber);background:var(--amber-p)}
.opt.msel{border-color:var(--sage);background:var(--sage-l)}
.opt.pri{border-color:var(--ember);background:var(--ember-p)}

.dr{width:16px;height:16px;min-width:16px;border-radius:50%;border:2px solid var(--ink20);margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.dc{width:16px;height:16px;min-width:16px;border-radius:4px;border:2px solid var(--ink20);margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}

.opt.sel .dr{border-color:var(--amber);background:var(--amber)}
.opt.sel .dr::after{content:'';width:5px;height:5px;background:var(--white);border-radius:50%}
.opt.msel .dc{border-color:var(--sage);background:var(--sage)}
.opt.msel .dc::after{content:'\2713';color:var(--white);font-size:10px;font-weight:700}
.opt.pri .dc{border-color:var(--ember);background:var(--ember)}
.opt.pri .dc::after{content:'\2605';color:var(--white);font-size:9px}

.opt h4{font-size:0.88rem;font-weight:500;line-height:1.3}
.opt p{font-size:0.76rem;color:var(--ink40);line-height:1.4;margin-top:0.08rem}

/* ── Tags ── */
.tags{display:flex;flex-wrap:wrap;gap:0.35rem}
.tag{padding:0.28rem 0.75rem;border:1.5px solid var(--ink10);border-radius:100px;font-size:0.8rem;cursor:pointer;transition:all 0.2s;background:var(--white);user-select:none}
.tag:hover{border-color:var(--amber-l)}
.tag.on{border-color:var(--amber);background:var(--amber-p);color:var(--amber);font-weight:500}
.tag.neg{border-color:var(--ember);background:var(--ember-p);color:var(--ember);font-weight:500}

/* ── Dual-pick (primary/secondary) ── */
.dual-note{font-size:0.78rem;color:var(--ink40);margin-bottom:0.8rem;font-style:italic}
.opt .label-badge{display:inline-block;font-size:0.65rem;padding:0.1rem 0.45rem;border-radius:4px;margin-left:0.4rem;font-weight:600;vertical-align:middle}
.label-pri{background:var(--ember);color:var(--white)}
.label-sec{background:var(--sage);color:var(--white)}

/* ── Fields ── */
.fg{margin-bottom:1.1rem}
.fl{display:block;font-size:0.82rem;font-weight:500;color:var(--ink70);margin-bottom:0.25rem}
.fh{display:block;font-size:0.74rem;color:var(--ink40);margin-bottom:0.4rem;font-style:italic}
.fi{width:100%;padding:0.7rem 0.85rem;border:1.5px solid var(--ink10);border-radius:8px;font-family:inherit;font-size:0.88rem;background:var(--white);color:var(--ink);transition:border-color 0.2s}
.fi:focus{outline:none;border-color:var(--amber)}
textarea.fi{resize:vertical;min-height:80px;line-height:1.5}

/* ── Slider ── */
.slider-wrap{padding:1.2rem 0}
.slider-row{display:flex;align-items:center;gap:1rem}
.slider-num{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:400;min-width:55px;text-align:center}
.slider-num.left{color:var(--sage)}
.slider-num.right{color:var(--ember)}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;border-radius:3px;outline:none;background:linear-gradient(90deg,var(--sage-l) 0%,var(--sage) 30%,var(--amber) 50%,var(--ember-g) 70%,var(--ember) 100%)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--white);border:2.5px solid var(--ink);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.slider-labels{display:flex;justify-content:space-between;margin-top:0.4rem}
.slider-labels span{font-size:0.74rem;color:var(--ink40)}
.slider-desc{text-align:center;margin-top:0.8rem;font-family:'Fraunces',serif;font-size:0.92rem;color:var(--ink70);font-style:italic}

/* ── Nav ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.2rem;border-top:1px solid var(--ink10)}
.nav-b{font-size:0.84rem;color:var(--ink40);cursor:pointer;background:none;border:none;font-family:inherit;transition:color 0.2s}
.nav-b:hover{color:var(--ink)}
.nav-n{padding:0.6rem 1.7rem;background:var(--ink);color:var(--cream);border:none;border-radius:100px;font-family:inherit;font-size:0.86rem;font-weight:500;cursor:pointer;transition:all 0.25s}
.nav-n:hover{background:var(--ember);transform:translateY(-1px)}

/* ── Result cards ── */
.rc{padding:1.5rem;border-radius:12px;border:1px solid var(--ink10);margin-bottom:1rem}
.rc.w{background:linear-gradient(135deg,var(--amber-p),var(--warm));border-color:rgba(212,147,13,0.15)}
.rc.c{background:linear-gradient(135deg,var(--sage-l),var(--warm));border-color:rgba(90,127,96,0.15)}
.rc.h{background:linear-gradient(135deg,var(--ember-p),var(--warm));border-color:rgba(194,77,44,0.15)}
.rc.d{background:var(--night);border-color:var(--night-s);color:var(--cream)}
.rc h3{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:400;margin-bottom:0.5rem}
.rc.w h3{color:var(--amber)}.rc.c h3{color:var(--sage)}.rc.h h3{color:var(--ember)}.rc.d h3{color:var(--amber-l)}
.rc p{font-size:0.86rem;color:var(--ink70);line-height:1.6}
.rc.d p{color:rgba(255,255,255,0.6)}
.rt{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.6rem}
.rtag{padding:0.18rem 0.55rem;border-radius:100px;font-size:0.74rem;background:rgba(255,255,255,0.7);border:1px solid var(--ink10);color:var(--ink70)}
.rc.d .rtag{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)}
.rtag.gap{border-color:rgba(194,77,44,0.2);color:var(--ember)}
.rtag.pri{border-color:var(--ember);background:var(--ember-p);color:var(--ember);font-weight:500}
.rtag.sec{border-color:var(--sage);background:var(--sage-l);color:var(--sage);font-weight:500}

/* Compat bars */
.cb{margin:0.4rem 0}
.cb-l{display:flex;justify-content:space-between;font-size:0.76rem;margin-bottom:0.15rem}
.cb-l span:first-child{color:var(--ink70)}.cb-l span:last-child{color:var(--ink40);font-style:italic}
.cb-t{height:5px;background:rgba(0,0,0,0.05);border-radius:3px;overflow:hidden}
.cb-f{height:100%;border-radius:3px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.cb-f.a{background:linear-gradient(90deg,var(--amber-l),var(--amber))}
.cb-f.e{background:linear-gradient(90deg,var(--ember-g),var(--ember))}
.cb-f.s{background:linear-gradient(90deg,#a8d5a8,var(--sage))}

/* ── Share card ── */
.share-card{max-width:400px;margin:1.5rem auto;padding:1.8rem;background:var(--white);border:1.5px solid var(--ink10);border-radius:14px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.04)}
.share-card h4{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:400;margin-bottom:0.3rem}
.share-card .style-badge{display:inline-block;padding:0.2rem 0.7rem;border-radius:100px;font-size:0.72rem;font-weight:600;margin:0.5rem 0.15rem;text-transform:uppercase;letter-spacing:0.08em}
.share-card .style-badge.pri{background:var(--ember-p);color:var(--ember);border:1px solid rgba(194,77,44,0.2)}
.share-card .style-badge.sec{background:var(--sage-l);color:var(--sage);border:1px solid rgba(90,127,96,0.2)}
.share-card .share-tags{display:flex;flex-wrap:wrap;gap:0.3rem;justify-content:center;margin:0.6rem 0}
.share-card .share-tag{font-size:0.72rem;padding:0.15rem 0.5rem;border:1px solid var(--ink10);border-radius:100px;color:var(--ink70)}
.share-card .seeking{font-size:0.8rem;color:var(--ink40);font-style:italic;margin-top:0.4rem}
.share-card .ratio{font-family:'Fraunces',serif;font-size:0.9rem;color:var(--ink70);margin-top:0.6rem}
.share-footer{font-size:0.68rem;color:var(--ink40);margin-top:0.8rem;letter-spacing:0.1em;text-transform:uppercase}

/* ── Animations ── */
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.an{opacity:0;animation:rise 0.55s ease forwards}
.an1{animation-delay:0.1s}.an2{animation-delay:0.2s}.an3{animation-delay:0.25s}
.an4{animation-delay:0.35s}.an5{animation-delay:0.45s}.an6{animation-delay:0.55s}

.bg-g::before{content:'';position:absolute;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(212,147,13,0.05) 0%,transparent 70%);top:-80px;right:-100px;pointer-events:none}

@media(max-width:600px){.card{padding:0 0.3rem}.slider-num{font-size:1.3rem;min-width:40px}}
</style>
</head>
<body>

<!-- ═══ INTRO ═══ -->
<div class="scr on center bg-g" id="s-intro">
  <div class="card" style="text-align:center">
    <div class="badge b-intro an an1">Know Thyself</div>
    <h1 class="big an an2">Hive <em>or</em> Heist</h1>
    <p class="sub an an3">Your creative collaboration profile</p>
    <p class="body an an4" style="max-width:480px;margin:0 auto 0.5rem">Understand your patterns. Name your strengths and gaps. Signal what you're looking for. This is your permanent profile — take it once, share what you want.</p>
    <p class="body an an5" style="font-size:0.85rem;color:var(--ink40);margin-bottom:2rem">About 6 minutes. Warm data first.</p>
    <button class="btn btn-p an an6" onclick="start()">Begin &rarr;</button>
  </div>
</div>

<!-- ═══ DIAGNOSTIC ═══ -->
<div class="scr top" id="s-diag">
  <div class="card">
    <div class="prog"><div class="prog-t"><div class="prog-f" id="pf"></div></div><div class="prog-l" id="pl"></div></div>
    <div id="body"></div>
  </div>
</div>

<!-- ═══ RESULTS ═══ -->
<div class="scr top" id="s-results">
  <div class="card" id="res"></div>
</div>

<!-- Formspree: Replace YOUR_FORM_ID below with your actual Formspree form ID (e.g. xyzabcde) -->
<form id="fs" style="display:none" action="https://formspree.io/f/xpqoloeg" method="POST"></form>

<script>
const D={};

const STEPS=[
  // ━━ WARM: DERAILS ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"When you have an idea you believe in, what typically stops you?",
    d:"Select all that honestly apply.",
    type:"multi",key:"derails",
    opts:[
      {id:"overthinking",l:"Overthinking",s:"Analyzing every angle until the window closes"},
      {id:"too_many_ideas",l:"Too many ideas",s:"The next one is always shinier"},
      {id:"doubt",l:"Doubt",s:"Without external validation, I lose faith"},
      {id:"no_structure",l:"Can't find the steps",s:"I see the destination but can't build the road"},
      {id:"no_accountability",l:"No accountability",s:"Without external stakes, I drift"},
      {id:"isolation",l:"Isolation",s:"Building alone is depleting"},
      {id:"perfectionism",l:"Perfectionism",s:"I polish instead of shipping"},
      {id:"cant_finish",l:"Can't finish",s:"Something stops me right before the end"},
    ]},

  // ━━ WARM: PRIMARY DERAIL ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"Of those, which one does the most damage?",
    d:"Pick the single biggest bottleneck.",
    type:"single_from_prev",key:"primary_derail",source:"derails"},

  // ━━ WARM: MIND ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"How does your mind actually work?",
    d:"Select all that fit. No wrong answers.",
    type:"multi",key:"mind",
    opts:[
      {id:"burst",l:"Intense bursts, then recovery",s:"Hyperfocus then need to disappear"},
      {id:"steady",l:"Slow and steady",s:"Consistent but rarely explosive"},
      {id:"divergent",l:"Ideas everywhere",s:"I connect things others miss, struggle to narrow"},
      {id:"convergent",l:"Give me ideas to evaluate",s:"Great at filtering and structuring"},
      {id:"adhd",l:"ADHD-like patterns",s:"Novelty-seeking, time-blind, brilliant starts (optional)"},
      {id:"autistic",l:"Autistic-like patterns",s:"Deep focus, systematic, detail-oriented (optional)"},
      {id:"hsp",l:"Highly sensitive / perceptive",s:"Pick up on everything, process deeply (optional)"},
    ]},

  // ━━ WARM: ENERGY ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"After a day of deep collaborative work, you feel...",
    d:"This matters more for matching than people think.",
    type:"single",key:"energy",
    opts:[
      {id:"energized",l:"Energized",s:"Collaboration fuels me. I leave with more than I came with."},
      {id:"neutral",l:"Neutral",s:"Depends on the person and the work. Could go either way."},
      {id:"drained",l:"Drained but satisfied",s:"Good work, but I need to recharge alone after."},
      {id:"depleted",l:"Depleted",s:"Deep collaboration is costly. I need a lot of solo recovery."},
    ]},

  // ━━ WARM: COLLAB STYLE (dual pick) ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"How do you like to work with others?",
    d:"Pick your primary style, then optionally a secondary.",
    type:"dual",key:"collab_style",
    opts:[
      {id:"landlord",l:"The Landlord",s:"My vision, my project. I want help but I have the last word."},
      {id:"partner_equal",l:"The Partner",s:"Equal ownership. We decide together, we build together."},
      {id:"contributor",l:"The Contributor",s:"Happy to bring my skills to your vision. Don't need ownership."},
      {id:"free_agent",l:"The Free Agent",s:"Clear scope, clean exit. I do my piece and move on."},
    ]},

  // ━━ WARM: PAST FAILURES ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"In past collaborations, what went wrong?",
    d:"Select all that you've experienced. This is the most predictive data.",
    type:"multi",key:"past_fails",
    opts:[
      {id:"did_everything",l:"I ended up doing everything",s:"The other person faded and I carried the load"},
      {id:"lost_interest",l:"The other person lost interest",s:"They were excited at first, then disappeared"},
      {id:"vision_clash",l:"Different visions",s:"We couldn't agree on direction and it split us"},
      {id:"pace_mismatch",l:"Pace didn't match",s:"One of us wanted to move fast, the other slow"},
      {id:"trust_broke",l:"Trust broke down",s:"Someone didn't follow through, or communication collapsed"},
      {id:"no_roles",l:"Unclear roles",s:"Nobody knew who was responsible for what"},
      {id:"never_tried",l:"I've never really collaborated",s:"This would be my first real attempt"},
    ]},

  // ━━ WARM: WHAT YOU'RE LOOKING FOR ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"What are you looking for right now?",
    d:"Select all that appeal. You can want multiple things at once.",
    type:"multi",key:"seeking",
    opts:[
      {id:"company",l:"Just company",s:"Someone who gets it. Don't want to be alone in this."},
      {id:"coffee",l:"Creative coffee",s:"Casual conversations about ideas. See what sparks."},
      {id:"sparring",l:"Sparring partner",s:"Building alongside someone. Honest feedback. Accountability."},
      {id:"discernment",l:"Discernment partner",s:"Help evaluating: is this real? Am I seeing clearly?"},
      {id:"build",l:"Build partner",s:"Someone to actually make something with. Shared stakes."},
      {id:"mentor",l:"A mentor",s:"Someone who's been through this and can guide me."},
      {id:"be_mentor",l:"To mentor someone",s:"I have experience and want to help someone earlier in the path."},
    ]},

  // ━━ WARM: COMMUNICATION ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"How do you prefer to communicate and work?",

    type:"tags",key:"comm_style",max:4,
    tags:["Direct and blunt","Diplomatic and careful","Written (async) over calls","Thinking out loud together","Structured check-ins","Organic flow","Voice notes / audio","Visual — sketches, boards, docs"]},

  // ━━ WARM: PACE ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"What's your natural pace?",
    d:"Pick up to 3.",
    type:"tags",key:"pace",max:3,
    tags:["Fast and scrappy","Slow and deliberate","Intense sprints","Steady rhythm","Deadline-driven","Open-ended exploration","Morning person","Night owl"]},

  // ━━ WARM: VALUES ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"What matters most in a working relationship?",
    d:"Pick up to 4.",
    type:"tags",key:"values",max:4,
    tags:["Honesty over politeness","Emotional safety","Creative risk-taking","Reliability","Autonomy and space","Playfulness","Intellectual rigor","Shared ownership","Mutual challenge","Generosity","Depth over speed","Follow-through"]},

  // ━━ WARM: DEALBREAKERS ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",

    type:"tags_neg",key:"dealbreakers",max:3,
    tags:["Flakiness / ghosting","Micromanagement","Avoidance of conflict","Moving without thinking","Overthinking without moving","Passive aggression","Taking credit for shared work","Lack of follow-through","Rigidity / my-way-or-highway","Chronic lateness","Vagueness / no clear commitments","Drama and emotional volatility"]},

  // ━━ WARM: URGENCY ━━
  {ph:"warm",b:"b-warm",tag:"Warm Data",
    t:"What's your runway?",
    d:"Be honest. Mismatched urgency kills partnerships.",
    type:"single",key:"urgency",
    opts:[
      {id:"exploring",l:"Just exploring",s:"No pressure. Tinkering, thinking, playing."},
      {id:"slow",l:"Building slowly",s:"I have time but want real progress"},
      {id:"traction",l:"Need traction soon",s:"A few months to make something work"},
      {id:"income",l:"Need income from this",s:"Financial pressure is real"},
    ]},

  // ━━ COLD: STRENGTHS ━━
  {ph:"cold",b:"b-cold",tag:"Cold Data",
    t:"What comes naturally to you?",
    d:"Not your CV. Your actual gifts. Select all that fit.",
    type:"tags",key:"strengths",max:99,
    tags:["Writing","Visual design","Code / dev","Strategy","Systems thinking","Research","Facilitation","Sales / persuasion","Operations","Teaching / mentoring","Community building","Creative direction","Data / analytics","Branding / positioning","Photography / video","Copywriting","UX / product thinking","Public speaking"]},

  // ━━ COLD: GAPS ━━
  {ph:"cold",b:"b-cold",tag:"Cold Data",
    t:"What's genuinely hard for you?",

const TOTAL = STEPS.length;
let step = 0;

function show(id,cls){document.querySelectorAll('.scr').forEach(s=>{s.classList.remove('on','top','center')});const el=document.getElementById(id);el.classList.add('on');if(cls)cls.split(' ').forEach(c=>el.classList.add(c))}
function start(){show('s-diag','top');render();window.scrollTo({top:0})}

function render(){
  const s=STEPS[step];
  document.getElementById('pf').style.width=((step+1)/TOTAL*100)+'%';
  document.getElementById('pl').textContent=`${step+1} / ${TOTAL}`;
  let h=`<div class="badge ${s.b}">${s.tag}</div><h2 class="qt">${s.t}</h2><p class="qd">${s.d}</p>`;

  if(s.type==='multi'){
    const arr=D[s.key]||[];
    h+='<div class="opts">';
    s.opts.forEach(o=>{
      const sel=arr.includes(o.id)?' msel':'';
      h+=`<div class="opt${sel}" onclick="tm('${s.key}','${o.id}')"><div class="dc"></div><div><h4>${o.l}</h4>${o.s?`<p>${o.s}</p>`:''}</div></div>`;
    });
    h+='</div>';
  }
  else if(s.type==='single'){
    h+='<div class="opts">';
    s.opts.forEach(o=>{
      const sel=D[s.key]===o.id?' sel':'';
      h+=`<div class="opt${sel}" onclick="D['${s.key}']='${o.id}';render()"><div class="dr"></div><div><h4>${o.l}</h4>${o.s?`<p>${o.s}</p>`:''}</div></div>`;
    });
    h+='</div>';
  }
  else if(s.type==='single_from_prev'){
    const prev=D[s.source]||[];
    if(prev.length===0){h+='<p style="color:var(--ink40);font-style:italic">Go back and select at least one option first.</p>';}
    else if(prev.length===1){D[s.key]=prev[0];h+=`<p style="font-style:italic;color:var(--ink70)">You only selected one \u2014 so that\u2019s your primary: <strong>${prev[0].replace(/_/g,' ')}</strong>.</p>`;}
    else{
      h+='<div class="opts">';
      const allOpts=STEPS.find(x=>x.key===s.source).opts;
      prev.forEach(id=>{
        const o=allOpts.find(x=>x.id===id);
        if(!o)return;
        const sel=D[s.key]===o.id?' sel':'';
        h+=`<div class="opt${sel}" onclick="D['${s.key}']='${o.id}';render()"><div class="dr"></div><div><h4>${o.l}</h4></div></div>`;
      });
      h+='</div>';
    }
  }
  else if(s.type==='dual'){
    const cur=D[s.key]||{pri:null,sec:null};
    h+='<p class="dual-note">Tap once for primary (red). Tap again for secondary (green). Tap a third time to deselect.</p>';
    h+='<div class="opts">';
    s.opts.forEach(o=>{
      let cls='',badge='';
      if(cur.pri===o.id){cls=' pri';badge='<span class="label-badge label-pri">Primary</span>';}
      else if(cur.sec===o.id){cls=' msel';badge='<span class="label-badge label-sec">Secondary</span>';}
      h+=`<div class="opt${cls}" onclick="dualPick('${s.key}','${o.id}')"><div class="dc"></div><div><h4>${o.l}${badge}</h4><p>${o.s}</p></div></div>`;
    });
    h+='</div>';
  }
  else if(s.type==='tags'||s.type==='tags_neg'){
    const arr=D[s.key]||[];
    const cls=s.type==='tags_neg'?'neg':'on';
    const maxN=s.max?` (pick up to ${s.max})`:'';
    h+='<div class="tags">';
    s.tags.forEach(t=>{
      const on=arr.includes(t)?` ${cls}`:'';
      h+=`<div class="tag${on}" onclick="tt('${s.key}',\`${t.replace(/`/g,'\\`')}\`,${s.max||99},'${cls}')">${t}</div>`;
    });
    h+='</div>';
  }
  else if(s.type==='form'){
    const data=D[s.key]||{};
    s.fields.forEach(f=>{
      h+=`<div class="fg">`;
      if(f.l)h+=`<label class="fl">${f.l}</label>`;
      if(f.h)h+=`<span class="fh">${f.h}</span>`;
      if(f.type==='textarea')h+=`<textarea class="fi" oninput="uf('${s.key}','${f.id}',this.value)">${data[f.id]||''}</textarea>`;
      else h+=`<input class="fi" type="${f.type}" value="${data[f.id]||''}" oninput="uf('${s.key}','${f.id}',this.value)">`;
      h+='</div>';
    });
  }
  else if(s.type==='slider_split'){
    const sp=D[s.key]||{ratio:70,bring:'',need:''};
    const need=100-sp.ratio;
    let desc='';
    if(sp.ratio>=85)desc="You have almost everything. You need a specialist for one specific gap.";
    else if(sp.ratio>=70)desc="Strong foundation. A complementary partner could unlock the rest.";
    else if(sp.ratio>=55)desc="Solid but significant gaps. A true partner or small crew would transform things.";
    else if(sp.ratio>=40)desc="You bring a lot but need more than you have. You might thrive joining someone else's vision.";
    else desc="You're at the beginning. Finding the right people isn't optional \u2014 it's everything.";

    h+=`<div class="slider-wrap">
      <div class="slider-row">
        <div class="slider-num left">${sp.ratio}%</div>
        <input type="range" min="10" max="95" step="5" value="${sp.ratio}" oninput="D['${s.key}']= D['${s.key}']||{ratio:70,bring:'',need:''};D['${s.key}'].ratio=+this.value;render()">
        <div class="slider-num right">${need}%</div>
      </div>
      <div class="slider-labels"><span>What I bring</span><span>What I need</span></div>
      <div class="slider-desc">${desc}</div>
    </div>`;
    h+=`<div class="fg" style="margin-top:1.2rem"><label class="fl">Your ${sp.ratio}% \u2014 what you bring</label><span class="fh">Your genuine gifts, in your own words</span>
      <textarea class="fi" oninput="uf('${s.key}','bring',this.value)">${sp.bring||''}</textarea></div>`;
    h+=`<div class="fg"><label class="fl">Your ${need}% \u2014 what you need</label><span class="fh">The gap that, filled by someone else, would change everything</span>
      <textarea class="fi" oninput="uf('${s.key}','need',this.value)">${sp.need||''}</textarea></div>`;
  }

  const isLast=step===TOTAL-1;
  h+=`<div class="nav">${step>0?`<button class="nav-b" onclick="step--;render();window.scrollTo({top:0})">\u2190 Back</button>`:'<div></div>'}
    <button class="nav-n" onclick="${isLast?'finish()':'step++;render();window.scrollTo({top:0})'}">${isLast?'See my results \u2192':'Continue \u2192'}</button></div>`;

  document.getElementById('body').innerHTML=h;
}

// ── Interactions ──
function tm(k,id){if(!D[k])D[k]=[];const i=D[k].indexOf(id);if(i>-1)D[k].splice(i,1);else D[k].push(id);render()}
function tt(k,t,max,cls){if(!D[k])D[k]=[];const i=D[k].indexOf(t);if(i>-1)D[k].splice(i,1);else if(D[k].length<max)D[k].push(t);render()}
function uf(k,f,v){if(!D[k])D[k]={};D[k][f]=v}
function dualPick(k,id){
  if(!D[k])D[k]={pri:null,sec:null};
  const c=D[k];
  if(c.pri===id){c.pri=c.sec;c.sec=null;}
  else if(c.sec===id){c.sec=null;}
  else if(!c.pri){c.pri=id;}
  else if(!c.sec&&c.pri!==id){c.sec=id;}
  else{c.sec=c.pri;c.pri=id;}
  render();
}

// ═══ RESULTS ═══
function finish(){
  show('s-results','top');window.scrollTo({top:0});buildResults();submitFS();
}

function submitFS(){
  const form=document.getElementById('fs');form.innerHTML='';
  const flat={};
  for(const[k,v]of Object.entries(D)){
    if(typeof v==='object'&&!Array.isArray(v))for(const[fk,fv]of Object.entries(v))flat[`${k}_${fk}`]=String(fv);
    else if(Array.isArray(v))flat[k]=v.join(', ');
    else flat[k]=String(v);
  }
  for(const[k,v]of Object.entries(flat)){const i=document.createElement('input');i.type='hidden';i.name=k;i.value=v||'';form.appendChild(i)}
  // Submit to Formspree (will work once you replace YOUR_FORM_ID above)
  const formAction = form.getAttribute('action');
  if (formAction && !formAction.includes('YOUR_FORM_ID')) {
    fetch(formAction, {method:'POST', body:new FormData(form), headers:{'Accept':'application/json'}})
      .then(r => console.log('Formspree:', r.ok ? 'submitted' : 'error'))
      .catch(e => console.log('Formspree error:', e));
  }
}

function buildResults(){
  const derails=D.derails||[];
  const priDerail=D.primary_derail||'';
  const mind=D.mind||[];
  const energy=D.energy||'';
  const collab=D.collab_style||{pri:null,sec:null};
  const fails=D.past_fails||[];
  const seeking=D.seeking||[];
  const comm=D.comm_style||[];
  const pace=D.pace||[];
  const values=D.values||[];
  const dealbreakers=D.dealbreakers||[];
  const urgency=D.urgency||'';
  const strengths=D.strengths||[];
  const gaps=D.gaps||[];
  const project=D.project||'';
  const id=D.identity||{};
  const sp=D.split||{ratio:70,bring:'',need:''};
  const name=id.name||'friend';
  const need=100-sp.ratio;

  // ── Derail insight ──
  let di='';
  if(priDerail==='overthinking')di="Your primary bottleneck is overthinking. You analyze until the window closes. You need someone who can interrupt the loop \u2014 a direct person who says \u201Cthis is good enough, ship it\u201D and means it.";
  else if(priDerail==='too_many_ideas')di="Your primary bottleneck is divergence \u2014 too many ideas competing for your attention. You need a convergent mind alongside you: someone who finds joy in narrowing, choosing, and committing.";
  else if(priDerail==='doubt')di="Your primary bottleneck is doubt without a sounding board. You need a discernment partner \u2014 someone who can honestly evaluate your ideas so the doubt has something real to push against.";
  else if(priDerail==='no_structure')di="You see destinations but can\u2019t build roads. You need an Architect \u2014 someone who translates vision into steps and timelines.";
  else if(priDerail==='no_accountability')di="Without external stakes, you drift. This isn\u2019t laziness \u2014 it\u2019s how your motivation system works. Even a light partnership with regular check-ins could transform your output.";
  else if(priDerail==='isolation')di="The loneliness isn\u2019t a mood. It\u2019s a structural problem eroding your capacity. Connection isn\u2019t a nice-to-have for you \u2014 it\u2019s the infrastructure your work depends on.";
  else if(priDerail==='perfectionism')di="You polish because shipping means exposure. A partner doesn\u2019t just help you finish \u2014 they share the vulnerability of putting something into the world.";
  else if(priDerail==='cant_finish')di="The last 20% requires different muscles than the first 80%. You need a finisher \u2014 someone who gets energy from closing rather than opening.";
  else if(derails.length>0)di="Your pattern of blockers suggests you\u2019ve been carrying too many roles alone. That\u2019s not a character flaw \u2014 it\u2019s an architecture problem.";

  // ── Mind insight ──
  let mi='';
  if(mind.includes('burst')&&mind.includes('divergent'))mi="Spark machine \u2014 intense, wide-ranging, generative. Ideal complement: someone steady and convergent who catches your sparks.";
  else if(mind.includes('steady')&&mind.includes('convergent'))mi="Engine room \u2014 reliable, clear-headed, good at choosing. You may need a divergent partner to light fires you\u2019re built to tend.";
  else if(mind.includes('divergent'))mi="Your mind connects what others miss. The cost: narrowing is painful. A convergent partner isn\u2019t limiting you \u2014 they\u2019re freeing you to go deeper on what matters.";
  else if(mind.includes('convergent'))mi="You excel at evaluation and structure. Pair with a divergent thinker and you become the filter that turns chaos into gold.";
  else if(mind.length>0)mi="Your cognitive profile has a clear shape. The key isn\u2019t fixing what\u2019s hard \u2014 it\u2019s finding someone for whom it\u2019s effortless.";

  // ── Energy note ──
  const enLabels={energized:'Collaboration energizes you',neutral:'Context-dependent',drained:'Need recovery after',depleted:'Collaboration is costly'};
  const enNotes={
    energized:'You thrive on co-creation. Match with people who can keep up \u2014 and be careful not to overwhelm partners who need more space.',
    neutral:'Your energy depends on the fit. This means choosing the right people is especially important for you.',
    drained:'Good collaboration is worth the cost, but you need a partner who respects recovery time and doesn\u2019t expect constant availability.',
    depleted:'Deep collaboration is a significant investment for you. Short, bounded engagements (sprints, not marathons) will serve you best.'
  };

  // ── Collab style ──
  const csLabels={landlord:'Landlord',partner_equal:'Partner',contributor:'Contributor',free_agent:'Free Agent'};
  const csDescs={
    landlord:"You want ownership and the last word. Best with Contributors and Free Agents. Two Landlords = trouble unless domains are clearly split.",
    partner_equal:"You want equality. Hardest to find, most powerful when it works. Requires deep trust and aligned vision.",
    contributor:"You bring your gifts without carrying structural weight. Not lesser \u2014 just different. You need a Landlord or Partner who values your input.",
    free_agent:"Clear scope, clean exits. Great for sprints and skill economy work. Need people who respect boundaries."
  };

  // ── Failure pattern insight ──
  let fi='';
  if(fails.includes('did_everything'))fi="You\u2019ve been burned by carrying the load alone. You need partners who demonstrably follow through \u2014 trial tasks before real commitment.";
  else if(fails.includes('vision_clash'))fi="Vision conflicts have hurt you before. Consider whether you\u2019re a Landlord who needs Contributors, rather than seeking Partners who will inevitably want to steer.";
  else if(fails.includes('never_tried'))fi="No collaboration scars \u2014 which means no data on what works for you. Start light. Creative coffee or a trial task before anything serious.";
  else if(fails.length>0)fi="Your past collaboration patterns tell a clear story about what to look for \u2014 and what to avoid \u2014 next time.";

  // ── Capacity bars ──
  const hasV=strengths.some(s=>['Writing','Creative direction','Strategy','Branding / positioning','Copywriting'].includes(s));
  const hasB=strengths.some(s=>['Code / dev','Visual design','Data / analytics','UX / product thinking','Photography / video'].includes(s));
  const hasC=strengths.some(s=>['Sales / persuasion','Community building','Operations','Facilitation','Public speaking','Networking / outreach'].includes(s));
  const bars=[
    {l:'Vision & articulation',p:hasV?85:28,t:'a',n:hasV?'Strong':'Key gap'},
    {l:'Making & building',p:hasB?80:25,t:'s',n:hasB?'Strong':'Key gap'},
    {l:'Connecting & shipping',p:hasC?75:20,t:'e',n:hasC?'Strong':'Major gap'},
  ];

  // ── Ideal partner traits ──
  let traits=[];
  if(mind.includes('divergent')||mind.includes('burst'))traits.push('steady and convergent');
  if(mind.includes('steady')||mind.includes('convergent'))traits.push('creative and generative');
  if(priDerail==='no_structure')traits.push('good at planning and structuring');
  if(priDerail==='doubt')traits.push('direct and honest in evaluation');
  if(priDerail==='isolation')traits.push('reliably present');
  if(priDerail==='cant_finish')traits.push('a natural finisher');
  if(energy==='depleted')traits.push('comfortable with async and bounded work');
  if(fails.includes('did_everything'))traits.push('someone who follows through without reminders');
  if(gaps.includes('Technical building'))traits.push('technically capable');
  if(gaps.includes('Marketing / visibility'))traits.push('comfortable with outreach');
  if(gaps.includes('Finishing / shipping'))traits.push('energized by closing');

  // ── Seeking labels ──
  const seekLabels={company:'Company',coffee:'Creative Coffee',sparring:'Sparring Partner',discernment:'Discernment Partner',build:'Build Partner',mentor:'Seeking Mentor',be_mentor:'Offering Mentorship'};

  // ═══ BUILD HTML ═══
  let out='';

  out+=`<div style="text-align:center;margin-bottom:2.5rem" class="an an1">
    <h1 class="big">Your map, <em>${name}</em></h1>
    <p class="body" style="color:var(--ink40)">Not a verdict. A starting point for finding your crew.</p></div>`;

  // Derails
  if(di)out+=`<div class="rc w an an2"><h3>Your primary bottleneck: ${priDerail.replace(/_/g,' ')}</h3><p>${di}</p>
    <div class="rt">${derails.map(d=>`<span class="rtag${d===priDerail?' pri':''}">${d.replace(/_/g,' ')}</span>`).join('')}</div></div>`;

  // Mind + energy
  if(mi)out+=`<div class="rc w an an3"><h3>How your mind works</h3><p>${mi}</p>
    <p style="margin-top:0.5rem;font-size:0.82rem"><strong>Energy:</strong> ${enLabels[energy]||'Unknown'}. ${enNotes[energy]||''}</p></div>`;

  // Collab style
  out+=`<div class="rc h an an3"><h3>Collaboration style</h3>
    <p><span class="rtag pri" style="margin-right:0.3rem">Primary: ${csLabels[collab.pri]||'Not set'}</span>${collab.sec?`<span class="rtag sec">Secondary: ${csLabels[collab.sec]}</span>`:''}</p>
    <p style="margin-top:0.5rem">${csDescs[collab.pri]||''}</p>
    ${fi?`<p style="margin-top:0.5rem;font-style:italic;font-size:0.84rem;color:var(--ink40)">From past experience: ${fi}</p>`:''}
    </div>`;

  // What you're looking for
  out+=`<div class="rc h an an4"><h3>Looking for</h3>
    <div class="rt">${seeking.map(s=>`<span class="rtag">${seekLabels[s]||s}</span>`).join('')}</div>
    <p style="margin-top:0.6rem"><strong>Urgency:</strong> ${({exploring:'Exploring',slow:'Building slowly',traction:'Need traction',income:'Need income'})[urgency]||'Unknown'}</p></div>`;

  // Working preferences
  out+=`<div class="rc c an an4"><h3>How you work</h3>
    <div class="rt">${comm.map(c=>`<span class="rtag">${c}</span>`).join('')}${pace.map(p=>`<span class="rtag">${p}</span>`).join('')}</div>
    <p style="margin-top:0.6rem"><strong>Values:</strong></p><div class="rt">${values.map(v=>`<span class="rtag">${v}</span>`).join('')}</div>
    <p style="margin-top:0.6rem"><strong>Dealbreakers:</strong></p><div class="rt">${dealbreakers.map(d=>`<span class="rtag gap">${d}</span>`).join('')}</div></div>`;

  // Capacity map
  out+=`<div class="rc c an an5"><h3>Capacity map</h3>
    ${bars.map(b=>`<div class="cb"><div class="cb-l"><span>${b.l}</span><span>${b.n}</span></div><div class="cb-t"><div class="cb-f ${b.t}" style="width:${b.p}%"></div></div></div>`).join('')}
    <div class="rt" style="margin-top:0.7rem">${strengths.map(s=>`<span class="rtag">\u2713 ${s}</span>`).join('')}</div>
    <div class="rt" style="margin-top:0.3rem">${gaps.map(g=>`<span class="rtag gap">\u2717 ${g}</span>`).join('')}</div></div>`;

  // The split
  out+=`<div class="rc w an an5"><h3>Your split: ${sp.ratio} / ${need}</h3>
    <p><strong>Your ${sp.ratio}%:</strong> ${sp.bring||'(Not described)'}</p>
    <p style="margin-top:0.4rem"><strong>Your ${need}%:</strong> ${sp.need||'(Not described)'}</p></div>`;

  // Ideal partner
  if(traits.length)out+=`<div class="rc d an an6"><h3>Your ideal partner is probably someone who is...</h3>
    <p>${traits.join(', ')}. Not because you\u2019re deficient \u2014 because wholeness is collaborative.</p></div>`;

  // ── SHAREABLE CARD ──
  out+=`<div class="an an6"><h3 style="font-family:'Fraunces',serif;text-align:center;margin:2rem 0 0.5rem;font-weight:400;font-size:1.1rem">Your shareable card</h3>

    <div class="share-card">
      <h4>${name}</h4>
      <div><span class="style-badge pri">${csLabels[collab.pri]||''}</span>${collab.sec?`<span class="style-badge sec">${csLabels[collab.sec]||''}</span>`:''}</div>
      <div class="share-tags">${strengths.slice(0,5).map(s=>`<span class="share-tag">${s}</span>`).join('')}</div>

    <button class="btn" style="font-size:0.85rem;padding:0.6rem 1.5rem;margin:0.3rem;background:var(--sage);color:var(--white)" onclick="screenshotHint()">Screenshot your share card \u2191</button>
    <p style="margin-top:0.8rem;font-size:0.78rem;color:var(--ink40)">Tip: scroll up to your shareable card and screenshot it to share on social media, Substack, or anywhere your people might see it.</p>

  // ConvertKit signup

// Save results as text file
function saveResults() {
  const derails = D.derails || [];
  const mind = D.mind || [];
  const energy = D.energy || '';
  const collab = D.collab_style || {pri:null,sec:null};
  const fails = D.past_fails || [];
  const seeking = D.seeking || [];
  const comm = D.comm_style || [];
  const pace = D.pace || [];
  const values = D.values || [];
  const dealbreakers = D.dealbreakers || [];
  const urgency = D.urgency || '';
  const strengths = D.strengths || [];
  const gaps = D.gaps || [];
  const project = D.project || '';
  const id = D.identity || {};
  const sp = D.split || {ratio:70,bring:'',need:''};

  const csLabels = {landlord:'Landlord',partner_equal:'Partner',contributor:'Contributor',free_agent:'Free Agent'};

  let txt = `HIVE OR HEIST — KNOW THYSELF RESULTS\n`;
  txt += `Generated: ${new Date().toLocaleDateString()}\n`;
  txt += `${'='.repeat(50)}\n\n`;
  txt += `Name: ${id.name||'Not provided'}\n`;
  txt += `Location: ${id.location||'Not provided'}\n\n`;
  txt += `WHAT DERAILS YOU\n`;
  txt += `Primary: ${(D.primary_derail||'').replace(/_/g,' ')}\n`;
  txt += `All: ${derails.map(d=>d.replace(/_/g,' ')).join(', ')}\n\n`;
  txt += `HOW YOUR MIND WORKS\n`;
  txt += `${mind.map(m=>m.replace(/_/g,' ')).join(', ')}\n`;
  txt += `Energy after collaboration: ${energy}\n\n`;
  txt += `COLLABORATION STYLE\n`;
  txt += `Primary: ${csLabels[collab.pri]||'Not set'}\n`;
  txt += `Secondary: ${csLabels[collab.sec]||'None'}\n\n`;
  txt += `PAST COLLABORATION PATTERNS\n`;
  txt += `${fails.map(f=>f.replace(/_/g,' ')).join(', ')||'None selected'}\n\n`;
  txt += `LOOKING FOR\n`;
  txt += `${seeking.join(', ')}\n`;
  txt += `Urgency: ${urgency}\n\n`;
  txt += `COMMUNICATION & PACE\n`;
  txt += `${[...comm,...pace].join(', ')}\n\n`;
  txt += `VALUES\n`;
  txt += `${values.join(', ')}\n\n`;
  txt += `DEALBREAKERS\n`;
  txt += `${dealbreakers.join(', ')}\n\n`;
  txt += `STRENGTHS\n`;
  txt += `${strengths.join(', ')}\n\n`;
  txt += `GAPS\n`;
  txt += `${gaps.join(', ')}\n\n`;
  txt += `PROJECT STATUS: ${project.replace(/_/g,' ')}\n\n`;
  txt += `THE SPLIT: ${sp.ratio} / ${100-sp.ratio}\n`;
  txt += `What I bring: ${sp.bring||'Not described'}\n`;
  txt += `What I need: ${sp.need||'Not described'}\n\n`;
  txt += `ABOUT\n`;
  txt += `${id.about||'Not provided'}\n\n`;
  txt += `${'='.repeat(50)}\n`;
  txt += `Hive or Heist \u2022 backtosenses.substack.com\n`;

  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hive-or-heist-results-${(id.name||'anon').toLowerCase().replace(/\s+/g,'-')}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function screenshotHint() {
  const card = document.querySelector('.share-card');
  if (card) {
    card.scrollIntoView({behavior:'smooth',block:'center'});
    card.style.boxShadow = '0 0 0 3px var(--amber)';
    setTimeout(() => { card.style.boxShadow = ''; }, 2000);
  }
}
